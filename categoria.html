<body class="bg-background text-dark font-sans">
<header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

<img src="logo/dklogo-removebg-preview.png" alt="DK" class="h-10 w-10 object-contain">

</a>
<nav class="hidden md:flex items-center gap-8" id="nav-categorias"></nav>
<div class="flex items-center gap-3">
<a href="https://wa.me/18293686994" target="_blank" class="bg-primary text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-orange-700">WhatsApp</a>
</div>
</div>
</div>
</header>

<main class="py-12">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

</div>

</div>
</main>

<footer class="bg-white py-12 border-t">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="grid md:grid-cols-4 gap-10">
<div>
<div class="flex items-center gap-2 mb-4">
<img src="logo/dklogo-removebg-preview.png" alt="DK" class="h-8 w-8">

<script src="dataStore.js"></script>
<script src="navigation.js"></script>
<script>
async function cargarCategoria() {
    try {
        await DataStore.cargarDatos();
        
        var params = new URLSearchParams(window.location.search);
        var slug = params.get('slug');
        if (!slug) {
            document.getElementById('categoria-titulo').textContent = 'Categoría no encontrada';
            return;
        }
        
        var cat = DataStore.getCategoriaBySlug(slug);
        if (cat) {
            document.getElementById('categoria-titulo').textContent = cat.nombre;
            document.title = cat.nombre + ' | DK Electronic';
        }
        
        var filtrados = DataStore.getProductosByCategoria(slug);
        var container = document.getElementById('productos');
        
        if (filtrados.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-gray-500">No hay productos en esta categoría.</p></div>';
            return;
        }
        
        container.innerHTML = filtrados.map(function(p) {
            var price = p.precio.toLocaleString();
            var wsLink = 'https://wa.me/18293686994?text=Quiero+comprar:+' + encodeURIComponent(p.nombre);
            return '<div class="bg-white rounded-lg shadow p-4"><img src="' + p.imagen + '" alt="' + p.nombre + '" class="w-full h-48 object-contain mb-4" onerror="this.src=\'https://placehold.co/400x300?text=Sin+imagen\'"><h3 class="font-medium text-sm line-clamp-2">' + p.nombre + '</h3><p class="text-primary font-bold mt-2">$' + price + '</p><a href="' + wsLink + '" class="block text-center bg-primary text-white py-2 rounded mt-3 text-sm hover:bg-orange-700">Comprar</a></div>';
        }).join('');
    } catch(e) {
        console.error('Error:', e);
        document.getElementById('productos').innerHTML = '<p class="text-red-500">Error al cargar productos</p>';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    cargarCategoria();
});
</script>
</body>
</html>
