<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DK Electronic - Admin Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .brand-colors { color: #c2410c; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-4">
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-2xl font-bold brand-colors mb-2">DK Electronic - Admin Local</h1>
            <p class="text-gray-600 text-sm">Edita los productos aquí, luego usa <code class="bg-gray-200 px-2 py-1 rounded">push.bat</code> para subir a GitHub</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow p-4">
                <h3 class="font-semibold mb-2">Agregar Producto</h3>
                <form id="agregarForm" class="space-y-2">
                    <input type="text" id="nombre" placeholder="Nombre del producto" class="w-full border rounded px-3 py-2" required>
                    <input type="text" id="marca" placeholder="Marca" class="w-full border rounded px-3 py-2" required>
                    <input type="text" id="modelo" placeholder="Modelo" class="w-full border rounded px-3 py-2">
                    <input type="number" id="precio" placeholder="Precio" class="w-full border rounded px-3 py-2" required>
                    <input type="text" id="precioOferta" placeholder="Precio oferta (opcional)" class="w-full border rounded px-3 py-2">
                    <select id="categoria" class="w-full border rounded px-3 py-2">
                        <option value="televisores">Televisores</option>
                        <option value="aires">Aires Acondicionados</option>
                        <option value="electrodomesticos">Electrodomésticos</option>
                    </select>
                    <input type="text" id="imagen" placeholder="URL de imagen" class="w-full border rounded px-3 py-2">
                    <textarea id="descripcion" placeholder="Descripción" class="w-full border rounded px-3 py-2" rows="2"></textarea>
                    <button type="submit" class="w-full bg-orange-700 text-white py-2 rounded hover:bg-orange-800">Agregar</button>
                </form>
            </div>

            <div class="bg-white rounded-lg shadow p-4 md:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold">Productos</h3>
                    <div class="space-x-2">
                        <button onclick="exportarJSON()" class="bg-green-600 text-white px-3 py-1 rounded text-sm">💾 Exportar productos.json</button>
                        <button onclick="importarJSON()" class="bg-blue-600 text-white px-3 py-2 rounded text-sm">📂 Importar</button>
                        <input type="file" id="importFile" class="hidden" accept=".json" onchange="handleImport(this)">
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="px-2 py-1 text-left">Nombre</th>
                                <th class="px-2 py-1 text-left">Marca</th>
                                <th class="px-2 py-1 text-right">Precio</th>
                                <th class="px-2 py-1 text-center">Cat</th>
                                <th class="px-2 py-1 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productosTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <h3 class="font-semibold mb-4">Marcas (Promociones)</h3>
            <div id="marcasList" class="grid grid-cols-2 md:grid-cols-5 gap-2"></div>
            <div class="mt-4 flex gap-2">
                <input type="text" id="nuevaMarca" placeholder="Nombre de marca" class="border rounded px-3 py-2 flex-1">
                <input type="text" id="nuevaMarcaUrl" placeholder="URL del logo" class="border rounded px-3 py-2 flex-1">
                <button onclick="agregarMarca()" class="bg-orange-700 text-white px-4 py-2 rounded">Agregar</button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-4">
            <h3 class="font-semibold mb-4">Configuración de Garantía</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm mb-1">Televisores</label>
                    <input type="text" id="garantiaTv" class="w-full border rounded px-3 py-2" value="2 años">
                </div>
                <div>
                    <label class="block text-sm mb-1">Aires</label>
                    <input type="text" id="garantiaAire" class="w-full border rounded px-3 py-2" value="2 años">
                </div>
                <div>
                    <label class="block text-sm mb-1">Electrodomésticos</label>
                    <input type="text" id="garantiaElec" class="w-full border rounded px-3 py-2" value="1 año">
                </div>
            </div>
            <button onclick="guardarGarantia()" class="mt-4 bg-orange-700 text-white px-4 py-2 rounded">Guardar Garantía</button>
        </div>
    </div>

    <script>
        let productos = { productos: [], marcas: [], garantia: {} };

        function loadData() {
            const stored = localStorage.getItem('dk_productos_local');
            if (stored) {
                productos = JSON.parse(stored);
            }
            renderTable();
            renderMarcas();
            renderGarantia();
        }

        function renderTable() {
            const tbody = document.getElementById('productosTable');
            tbody.innerHTML = productos.productos.map((p, i) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-2 py-1">${p.nombre}</td>
                    <td class="px-2 py-1">${p.marca}</td>
                    <td class="px-2 py-1 text-right">${formatPrice(p.precio)}</td>
                    <td class="px-2 py-1 text-center">${p.categoria.substring(0, 3)}</td>
                    <td class="px-2 py-1 text-center">
                        <button onclick="eliminarProducto(${i})" class="text-red-600 hover:text-red-800">✕</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderMarcas() {
            document.getElementById('marcasList').innerHTML = productos.marcas.map((m, i) => `
                <div class="flex items-center justify-between bg-gray-100 px-3 py-2 rounded">
                    <span>${m.nombre}</span>
                    <button onclick="eliminarMarca(${i})" class="text-red-600">✕</button>
                </div>
            `).join('');
        }

        function renderGarantia() {
            const g = productos.garantia || { televisores: '2 años', aires: '2 años', electrodomesticos: '1 año' };
            document.getElementById('garantiaTv').value = g.televisores || '2 años';
            document.getElementById('garantiaAire').value = g.aires || '2 años';
            document.getElementById('garantiaElec').value = g.electrodomesticos || '1 año';
        }

        function formatPrice(price) {
            return '$' + parseInt(price).toLocaleString('es-DO');
        }

        function saveData() {
            localStorage.setItem('dk_productos_local', JSON.stringify(productos));
        }

        document.getElementById('agregarForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nuevo = {
                nombre: document.getElementById('nombre').value,
                marca: document.getElementById('marca').value,
                modelo: document.getElementById('modelo').value,
                precio: parseInt(document.getElementById('precio').value),
                precioOferta: document.getElementById('precioOferta').value ? parseInt(document.getElementById('precioOferta').value) : null,
                categoria: document.getElementById('categoria').value,
                imagen: document.getElementById('imagen').value,
                descripcion: document.getElementById('descripcion').value,
                activo: true
            };
            productos.productos.push(nuevo);
            saveData();
            renderTable();
            this.reset();
        });

        function eliminarProducto(index) {
            if (confirm('¿Eliminar este producto?')) {
                productos.productos.splice(index, 1);
                saveData();
                renderTable();
            }
        }

        function agregarMarca() {
            const nombre = document.getElementById('nuevaMarca').value;
            const url = document.getElementById('nuevaMarcaUrl').value;
            if (nombre) {
                productos.marcas.push({ nombre, url: url || '', activo: true });
                saveData();
                renderMarcas();
                document.getElementById('nuevaMarca').value = '';
                document.getElementById('nuevaMarcaUrl').value = '';
            }
        }

        function eliminarMarca(index) {
            productos.marcas.splice(index, 1);
            saveData();
            renderMarcas();
        }

        function guardarGarantia() {
            productos.garantia = {
                televisores: document.getElementById('garantiaTv').value,
                aires: document.getElementById('garantiaAire').value,
                electrodomesticos: document.getElementById('garantiaElec').value
            };
            saveData();
            alert('Garantía guardada');
        }

        function exportarJSON() {
            const data = {
                productos: productos.productos,
                marcaPromo: {
                    nombre: "Marcas Destacadas",
                    productos: []
                },
                garantiaSettings: productos.garantia,
                brands: productos.marcas
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'productos.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importarJSON() {
            document.getElementById('importFile').click();
        }

        function handleImport(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        productos.productos = data.productos || [];
                        productos.marcas = data.brands || [];
                        productos.garantia = data.garantiaSettings || {};
                        saveData();
                        renderTable();
                        renderMarcas();
                        renderGarantia();
                        alert('Importado correctamente');
                    } catch (err) {
                        alert('Error al importar: ' + err.message);
                    }
                };
                reader.readAsText(file);
            }
        }

        loadData();
    </script>
</body>
</html>
